version: '3.8'

services:
  sentinel-agent:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - INJECTION_THRESHOLD=0.7
      - RISK_THRESHOLD=0.8
      - MAX_STEPS=20
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
